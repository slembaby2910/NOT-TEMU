services:
  db:
    image: postgres:15
    container_name: nottemu-db
    environment:
      POSTGRES_DB: nottemu_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: nottemu-queue
    ports:
      - "5672:5672"   
      - "15672:15672"