info:
  name: Register account
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8081/auth/register
  body:
    type: json
    data: |-
      {
        "name": "Khoa",
        "email": "khoa@test.com",
        "password": "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
